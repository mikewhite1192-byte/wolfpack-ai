name: Vercel Alias
on:
  push:
    branches: [main]

jobs:
  alias:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deploy
        run: |
          echo "Waiting for Vercel to finish deploying..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
              "https://api.vercel.com/v6/deployments?projectId=prj_4ay1KfF9iIKf12P9aDRXGjqdGrSS&limit=1&teamId=team_81YjAgPYAaAwJfRJgIF3tATR" \
              | jq -r '.deployments[0].state')
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "READY" ]; then
              echo "Deploy is ready!"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "Timed out waiting for deploy"
              exit 1
            fi
            sleep 10
          done

      - name: Get latest deployment URL
        id: deploy
        run: |
          DEPLOY_URL=$(curl -s -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            "https://api.vercel.com/v6/deployments?projectId=prj_4ay1KfF9iIKf12P9aDRXGjqdGrSS&limit=1&state=READY&teamId=team_81YjAgPYAaAwJfRJgIF3tATR" \
            | jq -r '.deployments[0].url')
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Latest deploy: $DEPLOY_URL"

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Alias to domains
        if: steps.deploy.outputs.url
        run: |
          vercel alias ${{ steps.deploy.outputs.url }} thewolfpack.ai --token ${{ secrets.VERCEL_TOKEN }} --scope mikes-projects-01e99254
          vercel alias ${{ steps.deploy.outputs.url }} thewolfpack-ai.vercel.app --token ${{ secrets.VERCEL_TOKEN }} --scope mikes-projects-01e99254
